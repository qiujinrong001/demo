<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思维导图</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',sans-serif;overflow:hidden;background:#F4F5F7;user-select:none}
        canvas{display:block;cursor:grab}
        canvas.grabbing{cursor:grabbing}

        /* 工具栏 */
        #toolbar{
            position:fixed;top:16px;left:50%;transform:translateX(-50%);
            display:flex;gap:2px;background:rgba(255,255,255,0.92);
            backdrop-filter:blur(12px);border-radius:14px;padding:5px;
            box-shadow:0 2px 20px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04);z-index:10;
        }
        .tb-btn{
            width:38px;height:38px;border:none;background:transparent;
            border-radius:10px;cursor:pointer;display:flex;align-items:center;
            justify-content:center;color:#666;font-size:14px;transition:all .2s;position:relative;
        }
        .tb-btn:hover{background:#f0f1f3;color:#333}
        .tb-btn:active{transform:scale(.9)}
        .tb-btn[disabled]{opacity:.3;pointer-events:none}
        .tb-sep{width:1px;margin:6px 4px;background:rgba(0,0,0,0.08)}
        .tb-btn .tip{
            position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);
            background:#333;color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;
            white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;
        }
        .tb-btn:hover .tip{opacity:1}

        /* 编辑输入框 */
        #editor{position:fixed;display:none;z-index:20}
        #editor input{
            border:2px solid #5B8FF9;border-radius:8px;padding:2px 12px;
            font-family:'Noto Sans SC',sans-serif;outline:none;background:#fff;
            box-shadow:0 4px 16px rgba(91,143,249,0.25);text-align:center;
        }

        /* 右键菜单 */
        #ctxMenu{
            position:fixed;display:none;z-index:30;
            background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);
            border-radius:12px;padding:5px;min-width:180px;
            box-shadow:0 8px 30px rgba(0,0,0,0.12),0 0 0 1px rgba(0,0,0,0.04);
        }
        .ctx-item{
            padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;
            color:#444;display:flex;align-items:center;gap:10px;transition:background .12s;
        }
        .ctx-item:hover{background:#F0F2F5}
        .ctx-item.danger{color:#E8684A}
        .ctx-item.danger:hover{background:#FEF0ED}
        .ctx-item i{width:16px;text-align:center;font-size:12px;opacity:.6}
        .ctx-sep{height:1px;margin:4px 8px;background:rgba(0,0,0,0.06)}

        /* Toast */
        #toast{
            position:fixed;bottom:30px;left:50%;
            transform:translateX(-50%) translateY(50px);
            background:rgba(40,40,50,0.88);backdrop-filter:blur(8px);
            color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;
            transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
            z-index:40;pointer-events:none;opacity:0;
        }
        #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        /* 卡片面板 */
        #cardPanel{
            position:fixed;top:0;right:-420px;width:400px;height:100vh;
            background:#fff;z-index:25;transition:right .35s cubic-bezier(.4,0,.2,1);
            box-shadow:-4px 0 30px rgba(0,0,0,0.1);display:flex;flex-direction:column;
        }
        #cardPanel.open{right:0}
        #cardHeader{
            display:flex;align-items:center;justify-content:space-between;
            padding:18px 20px;border-bottom:1px solid #eee;flex-shrink:0;
        }
        #cardTitle{font-size:16px;font-weight:700;color:#2D3436;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
        #cardClose{
            width:32px;height:32px;border:none;background:#f5f5f5;
            border-radius:8px;cursor:pointer;display:flex;align-items:center;
            justify-content:center;color:#999;font-size:13px;transition:all .2s;
        }
        #cardClose:hover{background:#E8684A;color:#fff}
        #cardBody{
            flex:1;overflow-y:auto;padding:20px;
        }
        .card-section{margin-bottom:20px}
        .card-section-title{
            font-size:12px;font-weight:600;color:#999;text-transform:uppercase;
            letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;
        }
        #cardContent{
            color:#444;font-size:14px;line-height:1.8;white-space:pre-wrap;
            background:#f8f9fb;border-radius:10px;padding:14px 16px;min-height:80px;
        }
        #cardContent.empty{color:#bbb;font-style:italic}
        #cardPptImages{display:flex;flex-direction:column;gap:10px}
        .card-ppt-img{
            width:100%;border-radius:10px;border:1px solid #eee;cursor:pointer;
            transition:transform .2s,box-shadow .2s;
        }
        .card-ppt-img:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
        #cardAiBtn{
            width:100%;padding:12px;border:none;border-radius:10px;
            background:linear-gradient(135deg,#5B8FF9,#9270CA);color:#fff;
            font-size:14px;font-weight:600;cursor:pointer;display:flex;
            align-items:center;justify-content:center;gap:8px;transition:all .2s;
            font-family:'Noto Sans SC',sans-serif;
        }
        #cardAiBtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,143,249,0.35)}
        #cardAiBtn:active{transform:scale(.97)}

        /* 快捷键面板 */
        #shortcuts{
            position:fixed;bottom:16px;right:16px;
            background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);
            border-radius:12px;padding:14px 18px;font-size:11px;color:#999;
            line-height:2.1;z-index:10;
            box-shadow:0 2px 12px rgba(0,0,0,0.04),0 0 0 1px rgba(0,0,0,0.03);
        }
        #shortcuts kbd{
            background:#F0F2F5;border:1px solid #E0E2E5;border-radius:4px;
            padding:1px 6px;font-family:'Noto Sans SC',monospace;font-size:10px;
            color:#777;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="toolbar">
        <button class="tb-btn" id="btnChild" title="添加子节点"><i class="fas fa-plus"></i><span class="tip">添加子节点</span></button>
        <button class="tb-btn" id="btnSibling" title="添加兄弟节点"><i class="fas fa-code-branch"></i><span class="tip">添加兄弟节点</span></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="btnEdit" title="编辑"><i class="fas fa-pen"></i><span class="tip">编辑节点</span></button>
        <button class="tb-btn" id="btnCollapse" title="折叠/展开"><i class="fas fa-compress-alt"></i><span class="tip">折叠/展开</span></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="btnDelete" title="删除"><i class="fas fa-trash-alt"></i><span class="tip">删除节点</span></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="btnZoomIn" title="放大"><i class="fas fa-search-plus"></i><span class="tip">放大</span></button>
        <button class="tb-btn" id="btnZoomOut" title="缩小"><i class="fas fa-search-minus"></i><span class="tip">缩小</span></button>
        <button class="tb-btn" id="btnFit" title="适应屏幕"><i class="fas fa-expand"></i><span class="tip">适应屏幕</span></button>
    </div>

    <div id="editor"><input type="text" id="editorInput"></div>

    <div id="ctxMenu">
        <div class="ctx-item" data-action="child"><i class="fas fa-plus"></i>添加子节点</div>
        <div class="ctx-item" data-action="sibling"><i class="fas fa-code-branch"></i>添加兄弟节点</div>
        <div class="ctx-sep"></div>
        <div class="ctx-item" data-action="card"><i class="fas fa-address-card"></i>查看卡片</div>
        <div class="ctx-item" data-action="edit"><i class="fas fa-pen"></i>编辑节点</div>
        <div class="ctx-item" data-action="collapse"><i class="fas fa-compress-alt"></i>折叠/展开</div>
        <div class="ctx-sep"></div>
        <div class="ctx-item danger" data-action="delete"><i class="fas fa-trash-alt"></i>删除节点</div>
    </div>

    <div id="toast"></div>
    <!-- 卡片面板 -->
    <div id="cardPanel">
        <div id="cardHeader">
            <span id="cardTitle"></span>
            <button id="cardClose"><i class="fas fa-times"></i></button>
        </div>
        <div id="cardBody">
            <div class="card-section">
                <div class="card-section-title"><i class="fas fa-align-left"></i> 详细内容</div>
                <div id="cardContent"></div>
            </div>
            <div class="card-section" id="cardPptSection">
                <div class="card-section-title"><i class="fas fa-image"></i> PPT图片</div>
                <div id="cardPptImages"></div>
            </div>
            <div class="card-section">
                <button id="cardAiBtn">
                    <i class="fas fa-robot"></i> AI快捷提问
                </button>
            </div>
        </div>
    </div>
    <!-- /卡片面板 -->

    <div id="shortcuts">
        <kbd>Tab</kbd> 添加子节点 &nbsp; <kbd>Enter</kbd> 添加兄弟节点<br>
        <kbd>双击</kbd> 编辑标题 &nbsp; <kbd>单击</kbd> 查看卡片<br>
        <kbd>Delete</kbd> 删除 &nbsp; <kbd>鼠标拖拽</kbd> 平移<br>
        <kbd>滚轮</kbd> 缩放 &nbsp; <kbd>右键</kbd> 菜单
    </div>

    <script>
    (function() {
        'use strict';

        // ===== 配置 =====
        const CONFIG = {
            H_GAP: 56,          // 水平间距
            ROOT_FONT: 20,
            L1_FONT: 15,
            L2_FONT: 13,
            ROOT_PAD_X: 28, ROOT_PAD_Y: 14,
            L1_PAD_X: 20,  L1_PAD_Y: 10,
            L2_PAD_X: 16,  L2_PAD_Y: 8,
            ROOT_H: 52, L1_H: 40, L2_H: 32,
            ROOT_R: 26, L1_R: 20, L2_R: 14,
            LINE_W_L1: 3, LINE_W_L2: 2, LINE_W_L3: 1.5,
            PPT_FONT: 10, PPT_H: 18, PPT_PAD_X: 8, PPT_PAD_Y: 4, PPT_GAP: 6, PPT_R: 9,
            EXP_FONT: 11, EXP_H: 16, EXP_GAP: 4,
        };

        // 分支调色板（高辨识度、不使用默认蓝紫）
        const BRANCH_COLORS = [
            '#5B8FF9', '#5AD8A6', '#F6BD16', '#E8684A',
            '#6DC8EC', '#9270CA', '#FF9D4D', '#269A99',
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        // ===== 数据模型 =====
        let idCounter = 0;

        function createNode(text, children, pptPage, explanation, detailContent) {
            return {
                id: ++idCounter,
                text: text,
                children: children || [],
                pptPage: pptPage || '',
                explanation: explanation || '',
                detailContent: detailContent || '',
                collapsed: false,
                cx: 0, cy: 0,
                width: 0, height: 0,
                totalHeight: 0,
                boxCenterOffset: 0,
                pptPageVisualH: 0,
                explanationVisualH: 0,
                subtreeHeight: 0,
                depth: 0,
                branchIndex: 0,
            };
        }

        // 初始示例数据
        let root = createNode('创造性思维', [
            createNode('发散思维', [
                createNode('头脑风暴', [], 'P4', '集思广益的团队方法', `头脑风暴是由Alex Osborn于1939年提出的创造性问题解决方法。

四大原则：
1. 延迟评判 - 不批评他人想法
2. 追求数量 - 越多越好
3. 鼓励搭便车 - 在他人想法基础上改进
4. 自由奔放 - 疯狂的想法受欢迎

最佳团队规模：5-10人
建议时长：30-45分钟`),
                createNode('自由联想', [], 'P5', '无拘束的思维跳跃'),
                createNode('逆向思考', [], 'P6', '从相反方向切入问题'),
                createNode('随机激发', [], 'P7', '借助随机刺激产生灵感'),
            ], 'P3', '突破常规，寻找多种可能'),
            createNode('收敛思维', [
                createNode('逻辑推理', [], 'P9', '演绎与归纳的严密论证', `逻辑推理是收敛思维的基础工具，用于从众多想法中筛选最优解。

演绎法（Deduction）：
从一般原理推导出特定结论
例：所有创意需满足预算 > 方案A超预算 > 排除方案A

归纳法（Induction）：
从具体案例中提炼普遍规律
例：分析10个成功产品 > 发现共性要素 > 形成方法论

溯因法（Abduction）：
从结果反推最可能的原因，是创新的核心推理模式`),
                createNode('归纳总结', [], 'P10', '从个案提炼普遍规律'),
                createNode('决策矩阵', [], 'P11', '多维度量化评估方案'),
            ], 'P8', '从发散结果中筛选最优解'),
            createNode('设计思维', [
                createNode('用户共情', [], 'P13', '深入理解用户真实需求', `用户共情是设计思维的第一步，也是最重要的一步。

三种方法：
1. 观察法 - 在用户自然环境中观察行为
2. 访谈法 - 深度了解用户的痛点和动机
3. 沉浸法 - 亲自体验用户的使用场景

共情地图四象限：
- 所说(Says) - 用户表达的内容
- 所做(Does) - 观察到的行为
- 所想(Thinks) - 未说出的深层想法
- 所感(Feels) - 情绪和感受`),
                createNode('问题定义', [], 'P14', '精准聚焦核心挑战'),
                createNode('原型设计', [], 'P15', '快速构建可验证的模型'),
                createNode('快速迭代', [], 'P16', '循环改进逼近最优方案'),
                createNode('用户测试', [], 'P17', '真实用户反馈驱动优化'),
            ], 'P12', '以人为本的创新方法论'),
            createNode('系统思维', [
                createNode('整体视角', [], 'P19', '宏观把握系统全貌'),
                createNode('动态关联', [], 'P20', '识别要素间的互动关系'),
                createNode('反馈循环', [], 'P21', '正负反馈的自我调节机制'),
            ], 'P18', '全局视角理解复杂系统'),
        ], 'P1', '本次演讲的核心主题');
const view = {
            offsetX: 0, offsetY: 0,
            scale: 1,
            selectedNode: null,
            hoveredNode: null,
            isDragging: false,
            dragStartX: 0, dragStartY: 0,
            dragStartOX: 0, dragStartOY: 0,
        };

        // ===== 布局引擎 =====

        // 根据深度获取垂直间距（层级越高间距越大）
        function getVGap(depth) {
            if (depth === 0) return 22;
            if (depth === 1) return 14;
            return 10;
        }

        function getFontSize(d) { return d === 0 ? CONFIG.ROOT_FONT : d === 1 ? CONFIG.L1_FONT : CONFIG.L2_FONT; }
        function getFontWeight(d) { return d <= 1 ? '600' : '400'; }
        function getPadX(d) { return d === 0 ? CONFIG.ROOT_PAD_X : d === 1 ? CONFIG.L1_PAD_X : CONFIG.L2_PAD_X; }
        function getPadY(d) { return d === 0 ? CONFIG.ROOT_PAD_Y : d === 1 ? CONFIG.L1_PAD_Y : CONFIG.L2_PAD_Y; }
        function getNodeH(d) { return d === 0 ? CONFIG.ROOT_H : d === 1 ? CONFIG.L1_H : CONFIG.L2_H; }
        function getNodeR(d) { return d === 0 ? CONFIG.ROOT_R : d === 1 ? CONFIG.L1_R : CONFIG.L2_R; }
        function getLineW(d) { return d === 0 ? CONFIG.LINE_W_L1 : d === 1 ? CONFIG.LINE_W_L2 : CONFIG.LINE_W_L3; }

        // 标记深度和分支索引
        function prepareTree(node, depth, branchIndex) {
            depth = depth || 0;
            branchIndex = branchIndex || 0;
            node.depth = depth;
            node.branchIndex = depth === 0 ? 0 : (depth === 1 ? branchIndex : node.branchIndex);
            if (depth === 0) {
                node.children.forEach(function(child, i) {
                    child.branchIndex = i % BRANCH_COLORS.length;
                    prepareTree(child, 1, i % BRANCH_COLORS.length);
                });
            } else {
                node.children.forEach(function(child) {
                    child.branchIndex = node.branchIndex;
                    prepareTree(child, depth + 1, node.branchIndex);
                });
            }
        }

        // 测量节点尺寸
        function measureNode(node) {
            var d = node.depth;
            var fs = getFontSize(d);
            var fw = getFontWeight(d);
            ctx.font = fw + ' ' + fs + 'px "Noto Sans SC",sans-serif';
            var tw = ctx.measureText(node.text).width;
            node.width = Math.max(56, tw + getPadX(d) * 2);
            node.height = getNodeH(d);
            node.pptPageVisualH = 0;
            node.explanationVisualH = 0;
            if (node.pptPage) {
                node.pptPageVisualH = CONFIG.PPT_H + CONFIG.PPT_GAP;
            }
            if (node.explanation) {
                node.explanationVisualH = CONFIG.EXP_H + CONFIG.EXP_GAP;
            }
            node.totalHeight = node.pptPageVisualH + node.height + node.explanationVisualH;
            node.boxCenterOffset = (node.pptPageVisualH - node.explanationVisualH) / 2;
        }

        // 自底向上计算子树高度（核心：避免重叠的关键）
        function calcSubtreeHeight(node) {
            measureNode(node);
            if (node.children.length === 0 || node.collapsed) {
                node.subtreeHeight = node.totalHeight;
                return;
            }
            node.children.forEach(function(child) { calcSubtreeHeight(child); });
            var gap = getVGap(node.depth);
            var total = 0;
            node.children.forEach(function(child, i) {
                total += child.subtreeHeight;
                if (i > 0) total += gap;
            });
            node.subtreeHeight = Math.max(node.totalHeight, total);
        }

        // 自顶向下分配节点位置
        function layoutNode(node, cx, subtreeCY) {
            node.cx = cx;
            node.cy = subtreeCY + node.boxCenterOffset;
            if (node.children.length === 0 || node.collapsed) return;

            var gap = getVGap(node.depth);
            var childTotalH = 0;
            node.children.forEach(function(child, i) {
                childTotalH += child.subtreeHeight;
                if (i > 0) childTotalH += gap;
            });

            var childLeftX = cx + node.width / 2 + CONFIG.H_GAP;
            var startY = subtreeCY - childTotalH / 2;

            node.children.forEach(function(child) {
                var childCx = childLeftX + child.width / 2;
                var childSubtreeCY = startY + child.subtreeHeight / 2;
                layoutNode(child, childCx, childSubtreeCY);
                startY += child.subtreeHeight + gap;
            });
        }

        // 执行完整布局
        function doLayout() {
            prepareTree(root, 0, 0);
            calcSubtreeHeight(root);
            layoutNode(root, 0, 0);
        }

        // ===== 渲染引擎 =====

        function roundRect(x, y, w, h, r) {
            r = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // 颜色工具
        function hexToRgb(hex) {
            var r = parseInt(hex.slice(1, 3), 16);
            var g = parseInt(hex.slice(3, 5), 16);
            var b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b];
        }
        function rgbStr(r, g, b, a) {
            return a !== undefined
                ? 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')'
                : 'rgb(' + r + ',' + g + ',' + b + ')';
        }
        function lighten(hex, amt) {
            var c = hexToRgb(hex);
            return rgbStr(
                Math.round(c[0] + (255 - c[0]) * amt),
                Math.round(c[1] + (255 - c[1]) * amt),
                Math.round(c[2] + (255 - c[2]) * amt)
            );
        }
        function darken(hex, amt) {
            var c = hexToRgb(hex);
            return rgbStr(
                Math.round(c[0] * (1 - amt)),
                Math.round(c[1] * (1 - amt)),
                Math.round(c[2] * (1 - amt))
            );
        }
        function withAlpha(hex, a) {
            var c = hexToRgb(hex);
            return rgbStr(c[0], c[1], c[2], a);
        }

        function getBranchColor(node) {
            return BRANCH_COLORS[node.branchIndex % BRANCH_COLORS.length];
        }

        function getNodeBg(node) {
            if (node.depth === 0) return '#2D3436';
            if (node.depth === 1) return getBranchColor(node);
            return lighten(getBranchColor(node), 0.82);
        }

        function getNodeText(node) {
            if (node.depth <= 1) return '#FFFFFF';
            return darken(getBranchColor(node), 0.35);
        }

        // 绘制背景点阵
        function drawBackground() {
            var w = canvas.width / dpr;
            var h = canvas.height / dpr;
            ctx.fillStyle = '#F4F5F7';
            ctx.fillRect(0, 0, w, h);

            var gridSize = 28 * view.scale;
            if (gridSize < 8) return; // 缩太小不画点
            var dotR = Math.max(0.6, 0.8 * Math.min(1, view.scale));
            ctx.fillStyle = '#D8DBE0';
            var startX = view.offsetX % gridSize;
            var startY = view.offsetY % gridSize;
            for (var x = startX; x < w; x += gridSize) {
                for (var y = startY; y < h; y += gridSize) {
                    ctx.beginPath();
                    ctx.arc(x, y, dotR, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // 绘制连接线
        function drawConnection(parent, child) {
            var sx = parent.cx + parent.width / 2;
            var sy = parent.cy;
            var ex = child.cx - child.width / 2;
            var ey = child.cy;
            var dx = ex - sx;
            var cp1x = sx + dx * 0.4;
            var cp2x = ex - dx * 0.4;
            var color = getBranchColor(child);
            var lw = getLineW(child.depth);

            // 发光底层
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.bezierCurveTo(cp1x, sy, cp2x, ey, ex, ey);
            ctx.strokeStyle = withAlpha(color, 0.12);
            ctx.lineWidth = lw + 6;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 主线
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.bezierCurveTo(cp1x, sy, cp2x, ey, ex, ey);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        // 绘制所有连接线
        function drawConnections(node) {
            if (node.collapsed) return;
            node.children.forEach(function(child) {
                drawConnection(node, child);
                drawConnections(child);
            });
        }

        // 绘制单个节点
        function drawNode(node) {
            var x = node.cx - node.width / 2;
            var y = node.cy - node.height / 2;
            var r = getNodeR(node.depth);
            var isSel = view.selectedNode && view.selectedNode.id === node.id;
            var isHov = view.hoveredNode && view.hoveredNode.id === node.id;

            // PPT页数徽章（节点上方）
            if (node.pptPage) {
                var pptFs = CONFIG.PPT_FONT;
                ctx.font = '500 ' + pptFs + 'px "Noto Sans SC",sans-serif';
                var pptTw = ctx.measureText(node.pptPage).width;
                var pptW = Math.max(30, pptTw + CONFIG.PPT_PAD_X * 2);
                var pptH = CONFIG.PPT_H;
                var pptX = node.cx - pptW / 2;
                var pptY = node.cy - node.height / 2 - CONFIG.PPT_GAP - pptH;
                var pptR = CONFIG.PPT_R;
                var pptBg = node.depth === 0 ? '#2D3436' : (node.depth === 1 ? getBranchColor(node) : lighten(getBranchColor(node), 0.7));
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.08)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 1;
                roundRect(pptX, pptY, pptW, pptH, pptR);
                ctx.fillStyle = pptBg;
                ctx.fill();
                ctx.restore();
                ctx.font = '500 ' + pptFs + 'px "Noto Sans SC",sans-serif';
                ctx.fillStyle = node.depth <= 1 ? '#FFFFFF' : darken(getBranchColor(node), 0.3);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.pptPage, node.cx, pptY + pptH / 2 + 0.5);
            }

            ctx.save();
            if (node.depth <= 1) {
                ctx.shadowColor = withAlpha(getBranchColor(node), 0.2);
                ctx.shadowBlur = 12;
                ctx.shadowOffsetY = 4;
            } else {
                ctx.shadowColor = 'rgba(0,0,0,0.06)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 2;
            }
            roundRect(x, y, node.width, node.height, r);
            ctx.fillStyle = getNodeBg(node);
            ctx.fill();
            ctx.restore();

            if (isHov && !isSel) {
                roundRect(x, y, node.width, node.height, r);
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            if (isSel) {
                roundRect(x - 3, y - 3, node.width + 6, node.height + 6, r + 3);
                ctx.strokeStyle = '#5B8FF9';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.save();
                ctx.shadowColor = withAlpha('#5B8FF9', 0.3);
                ctx.shadowBlur = 10;
                roundRect(x - 3, y - 3, node.width + 6, node.height + 6, r + 3);
                ctx.strokeStyle = 'rgba(91,143,249,0.01)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            }

            var fs = getFontSize(node.depth);
            var fw = getFontWeight(node.depth);
            ctx.font = fw + ' ' + fs + 'px "Noto Sans SC",sans-serif';
            ctx.fillStyle = getNodeText(node);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.text, node.cx, node.cy + 1);

            // 讲解文本（节点下方）
            if (node.explanation) {
                ctx.font = '400 ' + CONFIG.EXP_FONT + 'px "Noto Sans SC",sans-serif';
                var expTextColor = node.depth === 0 ? '#888' : (node.depth === 1 ? withAlpha(getBranchColor(node), 0.7) : darken(getBranchColor(node), 0.25));
                ctx.fillStyle = expTextColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.explanation, node.cx, node.cy + node.height / 2 + CONFIG.EXP_GAP + CONFIG.EXP_H / 2);
            }

            // 折叠指示器
            if (node.collapsed && node.children.length > 0) {
                var ix = node.cx + node.width / 2 + 14;
                var iy = node.cy;
                var ir = 9;
                ctx.beginPath();
                ctx.arc(ix, iy, ir, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.strokeStyle = getBranchColor(node);
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.font = '600 10px "Noto Sans SC",sans-serif';
                ctx.fillStyle = getBranchColor(node);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(node.children.length), ix, iy + 0.5);
            }
        }

        // 绘制所有节点
        function drawNodes(node) {
            drawNode(node);
            if (!node.collapsed) {
                node.children.forEach(function(child) { drawNodes(child); });
            }
        }

        // 主渲染函数
        function render() {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            var w = canvas.width / dpr;
            var h = canvas.height / dpr;
            ctx.clearRect(0, 0, w, h);

            drawBackground();

            ctx.save();
            ctx.translate(view.offsetX, view.offsetY);
            ctx.scale(view.scale, view.scale);
            drawConnections(root);
            drawNodes(root);
            ctx.restore();

            updateToolbarState();
        }

        // ===== 交互系统 =====

        // 坐标转换
        function screenToWorld(sx, sy) {
            return {
                x: (sx - view.offsetX) / view.scale,
                y: (sy - view.offsetY) / view.scale,
            };
        }
        function worldToScreen(wx, wy) {
            return {
                x: wx * view.scale + view.offsetX,
                y: wy * view.scale + view.offsetY,
            };
        }

        // 节点命中检测
        function hitTest(node, wx, wy) {
            var x = node.cx - node.width / 2;
            var y = node.cy - node.height / 2;
            return wx >= x && wx <= x + node.width && wy >= y && wy <= y + node.height;
        }

        // 折叠指示器命中检测
        function hitTestCollapse(node, wx, wy) {
            if (!node.collapsed || node.children.length === 0) return false;
            var ix = node.cx + node.width / 2 + 14;
            var iy = node.cy;
            var dx = wx - ix, dy = wy - iy;
            return dx * dx + dy * dy <= 12 * 12;
        }

        // 查找节点（后序遍历，上层优先）
        function findNodeAt(node, wx, wy) {
            for (var i = node.children.length - 1; i >= 0; i--) {
                var found = findNodeAt(node.children[i], wx, wy);
                if (found) return found;
            }
            if (hitTest(node, wx, wy)) return node;
            return null;
        }

        // 查找折叠按钮
        function findCollapseAt(node, wx, wy) {
            if (hitTestCollapse(node, wx, wy)) return node;
            for (var i = 0; i < node.children.length; i++) {
                var found = findCollapseAt(node.children[i], wx, wy);
                if (found) return found;
            }
            return null;
        }

        // 查找父节点
        function findParent(tree, target) {
            for (var i = 0; i < tree.children.length; i++) {
                if (tree.children[i].id === target.id) return tree;
                var found = findParent(tree.children[i], target);
                if (found) return found;
            }
            return null;
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', function(e) {
            if (e.button === 2) return; // 右键由 contextmenu 处理
            if (e.button !== 0) return;

            var rect = canvas.getBoundingClientRect();
            var sx = e.clientX - rect.left;
            var sy = e.clientY - rect.top;
            var world = screenToWorld(sx, sy);

            // 先检查折叠按钮
            var collapseNode = findCollapseAt(root, world.x, world.y);
            if (collapseNode) {
                collapseNode.collapsed = !collapseNode.collapsed;
                doLayout();
                render();
                return;
            }

            var node = findNodeAt(root, world.x, world.y);
            if (node) {
                view.selectedNode = node;
                // 单击：延迟执行，如果短时间内没有双击则打开卡片
                clearTimeout(view._clickTimer);
                var clickedNode = node;
                view._clickTimer = setTimeout(function() {
                    if (view.selectedNode && view.selectedNode.id === clickedNode.id) {
                        openCard(clickedNode);
                    }
                }, 280);
                render();
            } else {
                view.selectedNode = null;
                closeCard();
                view.isDragging = true;
                view.dragStartX = e.clientX;
                view.dragStartY = e.clientY;
                view.dragStartOX = view.offsetX;
                view.dragStartOY = view.offsetY;
                canvas.classList.add('grabbing');
                render();
            }
        });

        canvas.addEventListener('mousemove', function(e) {
            if (view.isDragging) {
                view.offsetX = view.dragStartOX + (e.clientX - view.dragStartX);
                view.offsetY = view.dragStartOY + (e.clientY - view.dragStartY);
                render();
                return;
            }

            var rect = canvas.getBoundingClientRect();
            var sx = e.clientX - rect.left;
            var sy = e.clientY - rect.top;
            var world = screenToWorld(sx, sy);
            var node = findNodeAt(root, world.x, world.y);
            var collapseNode = node ? null : findCollapseAt(root, world.x, world.y);
            var newHovered = node || collapseNode;

            if (newHovered !== view.hoveredNode) {
                view.hoveredNode = newHovered;
                canvas.style.cursor = newHovered ? 'pointer' : 'grab';
                render();
            }
        });

        canvas.addEventListener('mouseup', function() {
            view.isDragging = false;
            canvas.classList.remove('grabbing');
            canvas.style.cursor = view.hoveredNode ? 'pointer' : 'grab';
        });

        canvas.addEventListener('mouseleave', function() {
            view.isDragging = false;
            view.hoveredNode = null;
            canvas.classList.remove('grabbing');
            render();
        });

        // 滚轮缩放
        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var sx = e.clientX - rect.left;
            var sy = e.clientY - rect.top;

            var oldScale = view.scale;
            var factor = e.deltaY > 0 ? 0.92 : 1.08;
            view.scale = Math.max(0.15, Math.min(3, view.scale * factor));

            // 以鼠标位置为中心缩放
            view.offsetX = sx - (sx - view.offsetX) * view.scale / oldScale;
            view.offsetY = sy - (sy - view.offsetY) * view.scale / oldScale;
            render();
        }, { passive: false });

        // 双击编辑
        canvas.addEventListener('dblclick', function(e) {
            var rect = canvas.getBoundingClientRect();
            var sx = e.clientX - rect.left;
            var sy = e.clientY - rect.top;
            var world = screenToWorld(sx, sy);
            var node = findNodeAt(root, world.x, world.y);
            if (node) {
                clearTimeout(view._clickTimer);
                startEditing(node);
            }
        });

        // 右键菜单
        canvas.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var sx = e.clientX - rect.left;
            var sy = e.clientY - rect.top;
            var world = screenToWorld(sx, sy);
            var node = findNodeAt(root, world.x, world.y);

            if (node) {
                view.selectedNode = node;
                render();
                showContextMenu(e.clientX, e.clientY);
            } else {
                hideContextMenu();
            }
        });

        document.addEventListener('click', function(e) {
            if (!document.getElementById('ctxMenu').contains(e.target)) {
                hideContextMenu();
            }
        });

        // ===== 节点操作 =====

        function addChildNode(parent) {
            var child = createNode('新主题');
            parent.children.push(child);
            if (parent.collapsed) parent.collapsed = false;
            view.selectedNode = child;
            doLayout();
            render();
            openCard(child);
            setTimeout(function() { startEditing(child); }, 60);
        }

        function addSiblingNode(node) {
            if (node === root) { showToast('根节点不能添加兄弟节点'); return; }
            var parent = findParent(root, node);
            if (!parent) return;
            var idx = parent.children.indexOf(node);
            var sibling = createNode('新主题');
            parent.children.splice(idx + 1, 0, sibling);
            view.selectedNode = sibling;
            doLayout();
            render();
            openCard(sibling);
            setTimeout(function() { startEditing(sibling); }, 60);
        }

        function deleteNode(node) {
            if (node === root) { showToast('根节点不能删除'); return; }
            var parent = findParent(root, node);
            if (!parent) return;
            closeCard();
            var idx = parent.children.indexOf(node);
            parent.children.splice(idx, 1);
            view.selectedNode = parent;
            doLayout();
            render();
            showToast('已删除');
        }

        function toggleCollapse(node) {
            if (node.children.length === 0) return;
            node.collapsed = !node.collapsed;
            doLayout();
            render();
        }

        // ===== 编辑器 =====

        var editorEl = document.getElementById('editor');
        var editorInput = document.getElementById('editorInput');

        function startEditing(node) {
            view.selectedNode = node;
            var sp = worldToScreen(node.cx, node.cy);
            var sw = node.width * view.scale;
            var sh = node.height * view.scale;
            var canvasRect = canvas.getBoundingClientRect();

            editorEl.style.display = 'block';
            editorEl.style.left = (canvasRect.left + sp.x - sw / 2) + 'px';
            editorEl.style.top = (canvasRect.top + sp.y - sh / 2) + 'px';

            editorInput.style.width = Math.max(sw + 20, 80) + 'px';
            editorInput.style.height = sh + 'px';
            editorInput.style.fontSize = (getFontSize(node.depth) * view.scale) + 'px';
            editorInput.style.fontWeight = getFontWeight(node.depth);
            editorInput.style.color = getNodeText(node);
            editorInput.style.background = getNodeBg(node);
            editorInput.value = node.text;
            editorInput.focus();
            editorInput.select();
        }

        function finishEditing() {
            if (editorEl.style.display === 'none') return;
            var node = view.selectedNode;
            if (node && editorInput.value.trim()) {
                node.text = editorInput.value.trim();
            }
            editorEl.style.display = 'none';
            doLayout();
            render();
            // 更新卡片标题
            if (node) updateCard(node);
        }

        editorInput.addEventListener('blur', finishEditing);
        editorInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); finishEditing(); }
            if (e.key === 'Escape') { editorEl.style.display = 'none'; }
            e.stopPropagation();
        });

        // ===== 键盘事件 =====

        document.addEventListener('keydown', function(e) {
            if (editorEl.style.display === 'block') return;
            var sel = view.selectedNode;

            if (e.key === 'Tab') {
                e.preventDefault();
                if (sel) addChildNode(sel);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (sel) addSiblingNode(sel);
            } else if (e.key === 'Delete' || e.key === 'Backspace') {
                e.preventDefault();
                if (sel) deleteNode(sel);
            } else if (e.key === 'F2') {
                e.preventDefault();
                if (sel) startEditing(sel);
            } else if (e.key === ' ') {
                e.preventDefault();
                if (sel) toggleCollapse(sel);
            }
        });

        // ===== 右键菜单 =====

        var ctxMenuEl = document.getElementById('ctxMenu');

        function showContextMenu(x, y) {
            ctxMenuEl.style.display = 'block';
            ctxMenuEl.style.left = x + 'px';
            ctxMenuEl.style.top = y + 'px';
            // 边界修正
            var rect = ctxMenuEl.getBoundingClientRect();
            if (rect.right > window.innerWidth) ctxMenuEl.style.left = (x - rect.width) + 'px';
            if (rect.bottom > window.innerHeight) ctxMenuEl.style.top = (y - rect.height) + 'px';
        }

        function hideContextMenu() {
            ctxMenuEl.style.display = 'none';
        }

        ctxMenuEl.addEventListener('click', function(e) {
            var item = e.target.closest('.ctx-item');
            if (!item) return;
            var action = item.dataset.action;
            var sel = view.selectedNode;
            if (!sel) return;

            if (action === 'child') addChildNode(sel);
            else if (action === 'sibling') addSiblingNode(sel);
            else if (action === 'card') openCard(sel);
            else if (action === 'edit') startEditing(sel);
            else if (action === 'collapse') toggleCollapse(sel);
            else if (action === 'delete') deleteNode(sel);

            hideContextMenu();
        });

        // ===== 工具栏 =====

        function updateToolbarState() {
            var sel = view.selectedNode;
            document.getElementById('btnSibling').disabled = !sel || sel === root;
            document.getElementById('btnDelete').disabled = !sel || sel === root;
            document.getElementById('btnEdit').disabled = !sel;
            document.getElementById('btnChild').disabled = !sel;
            document.getElementById('btnCollapse').disabled = !sel || sel.children.length === 0;
        }

        document.getElementById('btnChild').addEventListener('click', function() {
            if (view.selectedNode) addChildNode(view.selectedNode);
        });
        document.getElementById('btnSibling').addEventListener('click', function() {
            if (view.selectedNode) addSiblingNode(view.selectedNode);
        });
        document.getElementById('btnEdit').addEventListener('click', function() {
            if (view.selectedNode) startEditing(view.selectedNode);
        });
        document.getElementById('btnCollapse').addEventListener('click', function() {
            if (view.selectedNode) toggleCollapse(view.selectedNode);
        });
        document.getElementById('btnDelete').addEventListener('click', function() {
            if (view.selectedNode) deleteNode(view.selectedNode);
        });
        document.getElementById('btnZoomIn').addEventListener('click', function() {
            zoomBy(1.2);
        });
        document.getElementById('btnZoomOut').addEventListener('click', function() {
            zoomBy(0.8);
        });
        document.getElementById('btnFit').addEventListener('click', fitToScreen);

        function zoomBy(factor) {
            var cx = canvas.width / dpr / 2;
            var cy = canvas.height / dpr / 2;
            var oldScale = view.scale;
            view.scale = Math.max(0.15, Math.min(3, view.scale * factor));
            view.offsetX = cx - (cx - view.offsetX) * view.scale / oldScale;
            view.offsetY = cy - (cy - view.offsetY) * view.scale / oldScale;
            render();
        }

        // ===== 适应屏幕 =====

        function getTreeBounds(node) {
            var minX = node.cx - node.width / 2;
            var maxX = node.cx + node.width / 2;
            var minY = node.cy - node.height / 2 - node.pptPageVisualH;
            var maxY = node.cy + node.height / 2 + node.explanationVisualH;
            if (!node.collapsed) {
                node.children.forEach(function(child) {
                    var cb = getTreeBounds(child);
                    minX = Math.min(minX, cb.minX);
                    maxX = Math.max(maxX, cb.maxX);
                    minY = Math.min(minY, cb.minY);
                    maxY = Math.max(maxY, cb.maxY);
                });
            }
            return { minX: minX, maxX: maxX, minY: minY, maxY: maxY };
        }

        function fitToScreen() {
            var bounds = getTreeBounds(root);
            var bw = bounds.maxX - bounds.minX;
            var bh = bounds.maxY - bounds.minY;
            var cw = canvas.width / dpr;
            var ch = canvas.height / dpr;
            var pad = 100;

            var sx = (cw - pad * 2) / Math.max(bw, 1);
            var sy = (ch - pad * 2) / Math.max(bh, 1);
            view.scale = Math.min(sx, sy, 1.5);
            view.scale = Math.max(view.scale, 0.15);

            var centerX = (bounds.minX + bounds.maxX) / 2;
            var centerY = (bounds.minY + bounds.maxY) / 2;
            view.offsetX = cw / 2 - centerX * view.scale;
            view.offsetY = ch / 2 - centerY * view.scale;
            render();
        }

        // ===== Toast =====

                // ===== 卡片面板 =====

        var cardPanel = document.getElementById('cardPanel');
        var cardTitle = document.getElementById('cardTitle');
        var cardContent = document.getElementById('cardContent');
        var cardPptImages = document.getElementById('cardPptImages');
        var cardPptSection = document.getElementById('cardPptSection');

        function openCard(node) {
            cardTitle.textContent = node.text;
            // 内容
            if (node.detailContent) {
                cardContent.textContent = node.detailContent;
                cardContent.classList.remove('empty');
            } else {
                cardContent.textContent = '(暂无详细内容，双击节点标题编辑，右键菜单可添加内容)';
                cardContent.classList.add('empty');
            }
            // PPT图片
            cardPptImages.innerHTML = '';
            if (node.pptImages && node.pptImages.length > 0) {
                cardPptSection.style.display = 'block';
                node.pptImages.forEach(function(src) {
                    var img = document.createElement('img');
                    img.src = src;
                    img.className = 'card-ppt-img';
                    img.title = '点击查看大图';
                    img.onclick = function() { window.open(src, '_blank'); };
                    cardPptImages.appendChild(img);
                });
            } else {
                cardPptSection.style.display = 'none';
            }
            // 更新AI按钮
            var aiBtn = document.getElementById('cardAiBtn');
            aiBtn.onclick = function() {
                var q = '请帮我详细分析一下"' + node.text + '"这个话题，给出更多的创意点子和实施建议。';
                // 复制到剪贴板
                navigator.clipboard.writeText(q).then(function() {
                    showToast('AI提问已复制到剪贴板！');
                }).catch(function() {
                    showToast('提问内容: ' + q);
                });
            };
            cardPanel.classList.add('open');
        }

        function closeCard() {
            cardPanel.classList.remove('open');
        }

        function updateCard(node) {
            if (cardPanel.classList.contains('open')) {
                openCard(node);
            }
        }

        document.getElementById('cardClose').addEventListener('click', function() {
            closeCard();
            view.selectedNode = null;
            render();
        });
function showToast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._t);
            el._t = setTimeout(function() { el.classList.remove('show'); }, 1800);
        }

        // ===== 初始化 =====

        function resizeCanvas() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }

        function init() {
            resizeCanvas();
            doLayout();
            fitToScreen();
        }

        window.addEventListener('resize', function() {
            resizeCanvas();
            render();
        });

        init();

    })();
    </script>
</body>
</html>
